{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Operator / Staff Registration</h2>
        <p class="subtitle">Create a new secure identity for terminal access.</p>
        
        <form method="POST" action="/signup" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus placeholder="Enter your ID or username">
            </div>
            
            <div class="form-group text-center" style="margin-bottom: 2rem;">
                <label>Select Role to Register</label>
                <div style="display: flex; justify-content: center; gap: 1rem; margin-top: 0.5rem;">
                    <a href="{{ url_for('signup', role='worker') }}" class="btn btn-sm {% if request.args.get('role', 'worker') == 'worker' %}btn-primary{% else %}btn-secondary{% endif %}">Worker</a>
                    <a href="{{ url_for('signup', role='manager') }}" class="btn btn-sm {% if request.args.get('role') == 'manager' %}btn-primary{% else %}btn-secondary{% endif %}">Manager</a>
                    <a href="{{ url_for('signup', role='admin') }}" class="btn btn-sm {% if request.args.get('role') == 'admin' %}btn-primary{% else %}btn-secondary{% endif %}">Admin</a>
                </div>
                <input type="hidden" name="role" value="{{ request.args.get('role', 'worker') }}">
            </div>

            {% if request.args.get('role', 'worker') == 'worker' %}
            <div class="form-group">
                <label for="department">Department (Workers Only)</label>
                <select id="department" name="department" required>
                    <option value="Production">Production</option>
                    <option value="Quality Control and Testing">Quality Control and Testing</option>
                    <option value="Inventory & Warehouse Management">Inventory & Warehouse Management</option>
                    <option value="Supply Chain & Logistics">Supply Chain & Logistics</option>
                    <option value="Maintenance">Maintenance</option>
                    <option value="IT">IT</option>
                </select>
            </div>
            {% endif %}
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter secure password">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">Register Identity</button>
        </form>
        <p class="auth-switch">Already have an identity? <a href="{{ url_for('login') }}">Log in here</a>.</p>
    </div>
</div>

<style>
    .btn-secondary {
        background-color: #374151;
        color: #D1D5DB;
        border: 1px solid #4B5563;
        text-decoration: none;
    }
    .btn-secondary:hover {
        background-color: #4B5563;
    }
    .btn-sm {
        padding: 0.4rem 1rem;
        font-size: 0.9rem;
        border-radius: 4px;
        text-decoration: none;
    }
</style>
{% endblock %}
